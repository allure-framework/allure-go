name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
      - "hotfix-*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: ${{ matrix.module }} Go 1.${{ matrix.go }}.x on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      ALLURE_MATRIX_ENV: ${{ matrix.module }}-${{ matrix.os }}-go-1-${{ matrix.go }}-x
      ALLURE_LABEL_MODULE: ${{ matrix.module }}
      ALLURE_TEST_DUMP_NAME: allure-results-${{ matrix.module }}-${{ matrix.os }}-go-1.${{ matrix.go }}.x
    strategy:
      fail-fast: false
      matrix:
        module: [commons, testify]
        go: ["25", "26"]
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Configure Git line endings
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - uses: actions/setup-go@v6
        with:
          go-version: 1.${{ matrix.go }}.x
          cache-dependency-path: |
            ${{ matrix.module }}/go.mod
            ${{ matrix.module }}/go.sum

      - name: Check formatting
        working-directory: ${{ matrix.module }}
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            printf 'gofmt is required for:\n%s\n' "${unformatted}"
            exit 1
          fi

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: |
          go vet ./...

      - name: Tidy check
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          test -z "$(git status --porcelain -- go.mod go.sum)"

      - name: Run tests with Allure
        if: always()
        run: |
          npx -y allure@3 run \
            --config ./allurerc.mjs \
            --rerun 2 \
            --environment="${{ env.ALLURE_MATRIX_ENV }}" \
            --dump="${{ env.ALLURE_TEST_DUMP_NAME }}" \
            -- go test -count=1 ./${{ matrix.module }}/...

      - name: Upload Allure test dump
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ALLURE_TEST_DUMP_NAME }}
          if-no-files-found: error
          retention-days: 7
          path: ./${{ env.ALLURE_TEST_DUMP_NAME }}.zip

  report:
    needs: [build]
    name: Build report
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      ALLURE_SERVICE_TOKEN: ${{ secrets.ALLURE_SERVICE_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Download Allure dumps
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: allure-results-*
          path: ./
          merge-multiple: true

      - name: Generate Allure report
        run: |
          npx -y allure@3 generate \
            --config ./allurerc.mjs \
            --dump="allure-results-*.zip" \
            --output=./build/allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          if-no-files-found: error
          retention-days: 7
          path: ./build/allure-report

      - name: Post Allure summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ./build/allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
